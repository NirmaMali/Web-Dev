<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET & POST Requests</title>
</head>
<body>
    <h3>GET Request <Form></Form></h3>
    <form method="get" action="http://localhost:3000/register">
        <input placeholder="Enter user name:" name="user" type="text">
        <input placeholder="enter password:" name="password"    type="text">
        <button>Register (GET)</button>
    </form>

    <hr>
    <h3>POST Request <Form></Form></h3>
    <form method="post" action="http://localhost:3000/register">
        <input placeholder="Enter user name:" name="user" type="text">
        <input placeholder="enter password:" name="password"    type="text">
        <button>Register (POST)</button>
    </form>
    <script src="app.js"></script>
</body>
</html>
